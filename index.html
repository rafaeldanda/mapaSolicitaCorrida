<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Leva</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px; background: #f0f0f0; }
        #btnInstalar { display: none; padding: 20px; background: #28a745; color: white; border: none; border-radius: 10px; font-weight: bold; width: 100%; font-size: 1.2rem; cursor: pointer; }
        .status { margin-top: 20px; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>
    <button id="btnInstalar">📲 INSTALAR APLICATIVO</button>
    <div id="status" class="status">Iniciando...</div>

    <script>
        let deferredPrompt;
        const status = document.getElementById('status');
        const btn = document.getElementById('btnInstalar');

        // Registro do Service Worker forçando o escopo da pasta
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => {
                    status.innerText = "SW registrado! Aguardando o Chrome liberar a instalação...";
                    console.log("SW registrado com sucesso:", reg);
                })
                .catch(err => {
                    status.innerText = "❌ Erro no SW: " + err;
                });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            btn.style.display = 'block';
            status.innerText = "✅ Tudo pronto! Clique no botão acima.";
        });

        btn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    btn.style.display = 'none';
                    status.innerText = "🎉 Instalando...";
                }
                deferredPrompt = null;
            }
        });
    </script>
</body>
</html>
