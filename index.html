<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Leva - Motorista</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2ea6ff">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f7f9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .ping-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 350px; }
        .contagem { font-size: 4em; color: #2ea6ff; font-weight: bold; margin: 10px 0; }
        .status-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .led { width: 12px; height: 12px; background-color: #ccc; border-radius: 50%; transition: 0.3s; }
        .led-active { background-color: #28a745; box-shadow: 0 0 10px #28a745; }
        .log-box { font-size: 0.75rem; color: #666; background: #f9f9f9; padding: 10px; border-radius: 8px; height: 80px; overflow-y: hidden; margin-top: 15px; border: 1px solid #eee; }
        .id-badge { font-size: 0.8rem; background: #eee; padding: 5px 10px; border-radius: 5px; color: #333; margin-top: 5px; display: inline-block; }
    </style>
</head>
<body>
    <div class="ping-box">
        <div class="status-container">
            <div id="led-signal" class="led"></div>
            <span id="txt-status" style="font-size: 0.8rem; font-weight: bold; color: #555;">SISTEMA ATIVO</span>
        </div>
        
        <p style="margin: 0; color: #888;">Motorista ID: <span id="display-id" class="id-badge">...</span></p>
        <div id="contador" class="contagem">0</div>
        
        <div id="log" class="log-box">Iniciando rastreamento...</div>
    </div>

    <script>
        // --- LÓGICA DE IDENTIFICAÇÃO (ID) ---
        const urlParams = new URLSearchParams(window.location.search);
        let motoristaId = urlParams.get('id');

        if (motoristaId) {
            // Se veio na URL, salva no celular
            localStorage.setItem('me_leva_id', motoristaId);
        } else {
            // Se não veio na URL, tenta ler o que foi salvo antes
            motoristaId = localStorage.getItem('me_leva_id') || "Sem_ID";
        }
        
        document.getElementById('display-id').innerText = motoristaId;
        // ------------------------------------

        const n8n_webhook = "https://primary-production-a103.up.railway.app/webhook/91e80c8e-2309-4dd4-8512-f0dc5c4af856";
        let pingsEnviados = 0;
        let lastPingTime = 0;
        const led = document.getElementById('led-signal');
        const log = document.getElementById('log');

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) { await navigator.wakeLock.request('screen'); } } catch (e) {}
        }
        requestWakeLock();

        function atualizarUI(msg) {
            log.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            led.classList.add('led-active');
            setTimeout(() => led.classList.remove('led-active'), 800);
        }

        async function processarLocalizacao(pos) {
            const agora = Date.now();
            if (agora - lastPingTime < 9000) return; // Trava em ~10 segundos

            lastPingTime = agora;
            const { latitude, longitude } = pos.coords;

            try {
                // Adicionamos o &id= no final da URL
                const url = `${n8n_webhook}?id=${motoristaId}&lat=${latitude}&lon=${longitude}&ping=${pingsEnviados + 1}`;
                const response = await fetch(url);
                if (response.ok) {
                    pingsEnviados++;
                    document.getElementById('contador').innerText = pingsEnviados;
                    atualizarUI(`ID ${motoristaId}: Sinal enviado!`);
                }
            } catch (err) {
                atualizarUI("Erro de conexão.");
            }
        }

        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(processarLocalizacao, 
            (err) => { atualizarUI("Erro GPS: " + err.code); }, 
            { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
