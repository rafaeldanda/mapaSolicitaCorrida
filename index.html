<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Leva - Motorista</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2ea6ff">
    
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f0f0; margin: 0; }
        .ping-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .contagem { font-size: 3em; color: #2ea6ff; font-weight: bold; margin: 20px 0; }
        .log { font-size: 0.8em; color: #666; margin-top: 20px; text-align: left; background: #eee; padding: 10px; height: 150px; overflow-y: scroll; border-radius: 8px; }
        h1 { color: #333; font-size: 1.5rem; }
    </style>
</head>
<body>

<div class="ping-box">
    <h1>Me Leva - Rastreamento</h1>
    <p>Enviando localização...</p>
    <div id="contador" class="contagem">0</div>
    <div id="log" class="log">Aguardando início...</div>
</div>

<script>
    const n8n_webhook = "https://primary-production-a103.up.railway.app/webhook/91e80c8e-2309-4dd4-8512-f0dc5c4af856";
    let pingsEnviados = 0;
    let chatId = "TESTE_SEQUENCIAL";

    // REGISTRO DO SERVICE WORKER (Obrigatório para PWA)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log("SW Ativo!"))
            .catch(err => console.log("Erro no SW:", err));
    }

    function adicionarLog(msg) {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function enviarPing() {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                try {
                    const response = await fetch(`${n8n_webhook}?chatId=${chatId}&lat=${latitude}&lon=${longitude}&ping=${pingsEnviados + 1}&test=true`);
                    if (response.ok) {
                        pingsEnviados++;
                        document.getElementById('contador').innerText = pingsEnviados;
                        adicionarLog(`✅ Localização enviada.`);
                    }
                } catch (err) {
                    adicionarLog(`❌ Erro de conexão.`);
                }
            }, (err) => {
                adicionarLog(`⚠️ Erro GPS: ${err.message}`);
            }, { enableHighAccuracy: true });
        }
    }

    setInterval(enviarPing, 5000);
    enviarPing();
</script>

</body>
</html>
