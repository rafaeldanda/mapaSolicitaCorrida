<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Leva - Motorista</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2ea6ff">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f7f9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .ping-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 350px; }
        .contagem { font-size: 4em; color: #2ea6ff; font-weight: bold; margin: 10px 0; }
        .status-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .led { width: 12px; height: 12px; background-color: #ccc; border-radius: 50%; transition: 0.3s; }
        .led-active { background-color: #28a745; box-shadow: 0 0 10px #28a745; }
        
        /* Botão de Instalação */
        #btnInstalar { 
            display: none; /* Começa escondido */
            width: 100%; padding: 18px; background: #28a745; color: white; 
            border: none; border-radius: 12px; font-weight: bold; 
            margin-bottom: 20px; cursor: pointer; 
        }

        .log-box { font-size: 0.75rem; color: #666; background: #f9f9f9; padding: 10px; border-radius: 8px; height: 60px; overflow: hidden; margin-top: 15px; border: 1px solid #eee; }
        .id-badge { font-size: 0.8rem; background: #eee; padding: 5px 10px; border-radius: 5px; color: #333; }
    </style>
</head>
<body>

    <button id="btnInstalar">📲 INSTALAR APLICATIVO</button>

    <div class="ping-box">
        <div class="status-container">
            <div id="led-signal" class="led"></div>
            <span id="txt-status" style="font-size: 0.8rem; font-weight: bold; color: #555;">SISTEMA ATIVO</span>
        </div>
        
        <p style="margin: 0; color: #888;">ID: <span id="display-id" class="id-badge">...</span></p>
        <div id="contador" class="contagem">0</div>
        
        <div id="log" class="log-box">Aguardando sinal...</div>
    </div>

    <script>
        // 1. GESTÃO DO ID (LocalStorage)
        const urlParams = new URLSearchParams(window.location.search);
        let motoristaId = urlParams.get('id') || localStorage.getItem('me_leva_id') || "Sem_ID";
        if (urlParams.get('id')) localStorage.setItem('me_leva_id', motoristaId);
        document.getElementById('display-id').innerText = motoristaId;

        // 2. LÓGICA DE INSTALAÇÃO (PWA)
        let deferredPrompt;
        const btn = document.getElementById('btnInstalar');

        // Só mostra o botão se NÃO estiver instalado
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Se estiver no navegador, mostra o botão
            if (!window.matchMedia('(display-mode: standalone)').matches) {
                btn.style.display = 'block';
            }
        });

        btn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') btn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        // 3. RASTREAMENTO E WEBHOOK
        const n8n_webhook = "https://primary-production-a103.up.railway.app/webhook/91e80c8e-2309-4dd4-8512-f0dc5c4af856";
        let pings = 0;
        let lastPing = 0;

        function atualizarUI(msg) {
            document.getElementById('log').innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            document.getElementById('led-signal').classList.add('led-active');
            setTimeout(() => document.getElementById('led-signal').classList.remove('led-active'), 800);
        }

        async function enviarPosicao(pos) {
            const agora = Date.now();
            if (agora - lastPing < 9000) return; // Garante intervalo de 10s
            
            lastPing = agora;
            const { latitude, longitude } = pos.coords;

            try {
                const res = await fetch(`${n8n_webhook}?id=${motoristaId}&lat=${latitude}&lon=${longitude}&ping=${pings + 1}`);
                if (res.ok) {
                    pings++;
                    document.getElementById('contador').innerText = pings;
                    atualizarUI("Sinal enviado!");
                }
            } catch (e) { atualizarUI("Erro de conexão."); }
        }

        // Inicia GPS
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(enviarPosicao, null, { enableHighAccuracy: true });
        }

        // Registro do SW
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        
        // WakeLock para não dormir
        if ('wakeLock' in navigator) { navigator.wakeLock.request('screen').catch(()=>{}); }
    </script>
</body>
</html>
