<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Leva - Motorista</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2ea6ff">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f7f9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .ping-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 350px; }
        .contagem { font-size: 4em; color: #2ea6ff; font-weight: bold; margin: 10px 0; }
        .status-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .led { width: 12px; height: 12px; background-color: #ccc; border-radius: 50%; transition: 0.3s; }
        .led-active { background-color: #28a745; box-shadow: 0 0 10px #28a745; }
        
        #btnInstalar { 
            display: none; width: 100%; padding: 18px; background: #28a745; color: white; 
            border: none; border-radius: 12px; font-weight: bold; 
            margin-bottom: 20px; cursor: pointer; font-size: 1rem;
        }

        .log-box { font-size: 0.75rem; color: #666; background: #f9f9f9; padding: 10px; border-radius: 8px; height: 60px; overflow: hidden; margin-top: 15px; border: 1px solid #eee; }
        .token-badge { font-size: 0.8rem; background: #e3f2fd; padding: 5px 12px; border-radius: 20px; color: #1976d2; font-weight: bold; border: 1px solid #bbdefb; }
    </style>
</head>
<body>

    <button id="btnInstalar">📲 INSTALAR APP MOTORISTA</button>

    <div class="ping-box">
        <div class="status-container">
            <div id="led-signal" class="led"></div>
            <span id="txt-status" style="font-size: 0.8rem; font-weight: bold; color: #555;">SISTEMA ONLINE</span>
        </div>
        
        <p style="margin: 0; color: #888; font-size: 0.9rem; margin-bottom: 5px;">Token de Acesso:</p>
        <span id="display-token" class="token-badge">Carregando...</span>
        
        <div id="contador" class="contagem">0</div>
        <p style="margin: 0; color: #aaa; font-size: 0.8rem;">Sinais enviados ao servidor</p>
        
        <div id="log" class="log-box">Iniciando rastreador...</div>
    </div>

    <script>
        // 1. GESTÃO DO TOKEN (URL e LocalStorage)
        const urlParams = new URLSearchParams(window.location.search);
        let motoristaToken = urlParams.get('token');

        if (motoristaToken) {
            localStorage.setItem('me_leva_token', motoristaToken);
        } else {
            motoristaToken = localStorage.getItem('me_leva_token') || "Token_Nao_Encontrado";
        }
        document.getElementById('display-token').innerText = motoristaToken;

        // 2. LÓGICA DE INSTALAÇÃO (PWA)
        let deferredPrompt;
        const btn = document.getElementById('btnInstalar');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (!window.matchMedia('(display-mode: standalone)').matches) {
                btn.style.display = 'block';
            }
        });

        btn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') btn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        // 3. RASTREAMENTO E WEBHOOK (Envio de 10 em 10 segundos)
        const n8n_webhook = "https://primary-production-a103.up.railway.app/webhook/91e80c8e-2309-4dd4-8512-f0dc5c4af856";
        let pings = 0;
        let lastPing = 0;

        function atualizarUI(msg) {
            document.getElementById('log').innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            const led = document.getElementById('led-signal');
            led.classList.add('led-active');
            setTimeout(() => led.classList.remove('led-active'), 1000);
        }

        async function enviarPosicao(pos) {
            const agora = Date.now();
            // Filtro para garantir o intervalo de 1 minuto
            if (agora - lastPing < 59500) return; 
            
            lastPing = agora;
            const { latitude, longitude } = pos.coords;

            try {
                // Envia como ?token= para o n8n
                const response = await fetch(`${n8n_webhook}?token=${motoristaToken}&lat=${latitude}&lon=${longitude}&ping=${pings + 1}`);
                if (response.ok) {
                    pings++;
                    document.getElementById('contador').innerText = pings;
                    atualizarUI("Localização enviada!");
                }
            } catch (e) { 
                atualizarUI("Erro ao conectar no n8n."); 
            }
        }

        // Ativa o GPS contínuo
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(enviarPosicao, 
            (err) => { atualizarUI("Erro GPS: " + err.code); }, 
            { enableHighAccuracy: true, maximumAge: 0 });
        } else {
            atualizarUI("GPS não disponível.");
        }

        // Manter a tela ligada
        if ('wakeLock' in navigator) {
            navigator.wakeLock.request('screen').catch(()=>{});
        }

        // Registro do Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
