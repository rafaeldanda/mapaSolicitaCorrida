<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Leva</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        #btnInstalar { display: none; padding: 20px; background: #28a745; color: white; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <button id="btnInstalar">📲 INSTALAR APLICATIVO</button>
    <div id="status">Aguardando validação do Chrome...</div>

    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('btnInstalar').style.display = 'block';
            document.getElementById('status').innerText = "✅ Pronto!";
        });

        document.getElementById('btnInstalar').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
            }
        });

        // Registro do SW com caminho relativo
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
